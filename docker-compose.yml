services:
  mongodb:
    image: mongo:7
    container_name: collabboard_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - collabboard_network

  backend:
    build: ./backend
    container_name: collabboard_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - collabboard_network

  frontend:
    build: ./frontend
    container_name: collabboard_frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - collabboard_network

volumes:
  mongo_data:

networks:
  collabboard_network:
    driver: bridge
